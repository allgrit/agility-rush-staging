        './vendor/three/examples/jsm/postprocessing/RenderPass.js',
        './vendor/three/examples/jsm/postprocessing/UnrealBloomPass.js',
        './vendor/three/examples/jsm/postprocessing/OutputPass.js',
        './vendor/three/examples/jsm/postprocessing/Pass.js',
        './vendor/three/examples/jsm/postprocessing/MaskPass.js',
        './vendor/three/examples/jsm/postprocessing/ShaderPass.js',
        './vendor/three/examples/jsm/shaders/CopyShader.js',
        './vendor/three/examples/jsm/shaders/LuminosityHighPassShader.js',
        './vendor/three/examples/jsm/shaders/OutputShader.js',
        './vendor/three/examples/jsm/loaders/GLTFLoader.js',
        './vendor/three/examples/jsm/utils/BufferGeometryUtils.js',
        './vendor/three/examples/jsm/utils/SkeletonUtils.js'

        return Promise.all(runtimeUrls.map(function (url) {

<style>
  :root {
    --accent: #ffb347;

  }

  /* Обучение — большая белая полупрозрачная лапа-жест поверх экрана (стиль Subway Surfers).
     Одна лапа делает понятное движение: вверх/вниз/вбок/тап-в-ритм. Без текста и карточек. */
  #tut-hint {
    position: fixed; inset: 0; display: none; z-index: 25;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .th-paw {
    width: min(200px, 52vw); height: auto;
    filter: brightness(0) invert(1) drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    opacity: 0.55; will-change: transform, opacity;
  }
  .th-up   { animation: pawup 1.2s ease-in-out infinite; }
  .th-down { animation: pawdown 1.2s ease-in-out infinite; }
  .th-side { animation: pawside 1.3s ease-in-out infinite; }
  .th-left  { animation: pawleft 1.1s ease-in-out infinite; }
  .th-right { animation: pawright 1.1s ease-in-out infinite; }
  .th-tap  { animation: pawtap 1.1s ease-in-out infinite; }
  @keyframes pawup   { 0%{transform:translateY(80px);opacity:0} 25%{opacity:.6} 70%{transform:translateY(-65px);opacity:.6} 100%{transform:translateY(-65px);opacity:0} }
  @keyframes pawdown { 0%{transform:translateY(-80px) rotate(180deg);opacity:0} 25%{opacity:.6} 70%{transform:translateY(65px) rotate(180deg);opacity:.6} 100%{transform:translateY(65px) rotate(180deg);opacity:0} }
  @keyframes pawside { 0%{transform:translateX(-95px) rotate(-90deg);opacity:.25} 50%{transform:translateX(95px) rotate(-90deg);opacity:.6} 100%{transform:translateX(-95px) rotate(-90deg);opacity:.25} }
  @keyframes pawleft  { 0%{transform:translateX(70px) rotate(-90deg);opacity:0} 30%{opacity:.6} 75%{transform:translateX(-75px) rotate(-90deg);opacity:.6} 100%{transform:translateX(-75px) rotate(-90deg);opacity:0} }
  @keyframes pawright { 0%{transform:translateX(-70px) rotate(90deg);opacity:0} 30%{opacity:.6} 75%{transform:translateX(75px) rotate(90deg);opacity:.6} 100%{transform:translateX(75px) rotate(90deg);opacity:0} }
  @keyframes pawtap  {
    0%{transform:translateX(-70px) scale(.8);opacity:.25} 15%{transform:translateX(-70px) scale(1.15);opacity:.65}
    40%{transform:translateX(-70px) scale(.9);opacity:.3} 50%{transform:translateX(70px) scale(.8);opacity:.25}
    65%{transform:translateX(70px) scale(1.15);opacity:.65} 90%{transform:translateX(70px) scale(.9);opacity:.3}
    100%{transform:translateX(-70px) scale(.8);opacity:.25}
  }
  /* Десктоп играет клавишами — вместо жеста показываем капсулу нужной клавиши */
  .th-keys {
    font-size: 26px; font-weight: 900; color: #fff; padding: 10px 22px;
    background: rgba(10,16,30,0.55); border: 2px solid rgba(255,255,255,0.7); border-radius: 14px;
    animation: thkeypulse 0.8s ease-in-out infinite;
  }
  @keyframes thkeypulse { 50% { transform: scale(1.08); box-shadow: 0 0 22px rgba(255,255,255,0.4); } }

  #chain {

  #powerups .pw { display: flex; align-items: center; gap: 6px; font-size: 20px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  #powerups .pw i { display: block; width: 60px; height: 5px; background: linear-gradient(90deg, #9adcff, #4a9ad8); border-radius: 3px; }
  #powerups .pw.pw-tug i { background: linear-gradient(90deg, #c79bff, #7a45c0); }
  /* Отсчёт секунд рядом с иконкой эффекта (кроме мгновенного щита) */
  #powerups .pw em { font-style: normal; font-size: 13px; font-weight: 800; color: #eaf2ff; min-width: 22px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  /* Кнопка-иконка активации тягача (расходник): тап по ходу забега. Справа снизу — под большой палец. */
  /* Кнопка = кольцо-пуллер: фиолетовый бублик с ДЫРКОЙ по центру (radial-gradient), число в дырке. */
  /* Бокс кнопки-пуллера: кольцо + подпись + подсказка-тап для новичка. Справа снизу. */
  #tug-box { position: absolute; right: 16px; bottom: 16px; z-index: 8; display: flex; flex-direction: column; align-items: center; gap: 3px; pointer-events: none; }
  #tug-btn { position: relative; width: 66px; height: 66px; border: none; border-radius: 50%; pointer-events: auto;
    background: radial-gradient(circle, transparent 30%, #c088f5 33%, #8a52d8 48%, #6b3fb0 58%, transparent 62%);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent; padding: 0; filter: drop-shadow(0 3px 10px rgba(140,70,220,0.6)); }
  #tug-btn b { font-size: 15px; font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.65); }
  #tug-btn.on { animation: tugpulse 0.85s ease-in-out infinite; cursor: default; }
  #tug-btn.off { opacity: 0.42; filter: grayscale(0.55) drop-shadow(0 3px 8px rgba(120,60,200,0.4)); }
  #tug-cap { font-size: 11px; font-weight: 700; color: #d9c6f5; text-shadow: 0 1px 3px rgba(0,0,0,0.75); letter-spacing: 0.3px; }
  @keyframes tugpulse { 0%,100% { filter: drop-shadow(0 3px 10px rgba(150,90,240,0.55)); } 50% { filter: drop-shadow(0 3px 18px rgba(190,130,255,0.95)); } }
  /* Подсказка новичку («тап сюда»): палец над кнопкой + пульсирующее кольцо */
  #tug-hint { position: absolute; left: 50%; top: -10px; transform: translateX(-50%); font-size: 27px; display: none; z-index: 9; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.55)); }
  #tug-box.hint #tug-hint { display: block; animation: tugtap 1s ease-in-out infinite; }
  #tug-box.hint #tug-btn::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 3px solid #ffd587; animation: tugring 1.2s ease-out infinite; }
  @keyframes tugtap { 0%,100% { transform: translateX(-50%) translateY(0) scale(1); } 45% { transform: translateX(-50%) translateY(15px) scale(0.8); } }
  @keyframes tugring { 0% { transform: scale(0.8); opacity: 0.85; } 100% { transform: scale(1.55); opacity: 0; } }

  /* Попапы наград */
  #popups { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

    position: absolute; transform: translate(-50%, -50%);

  @keyframes popfly {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.4); }
    12% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
    22% { transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -160%) scale(0.9); }
  }
  .popup.perfect { font-size: 44px; color: #ffe08a; -webkit-text-stroke: 1.5px #b8681f; letter-spacing: 2px; }

  /* Меню */

  /* Карточка меню НЕ скроллится целиком: шапка (герой/титул/собаки/СТАРТ) видна всегда,

  .menu-card {

  /* Гибрид-меню (парадигма SS): tap-to-play + панели меты + нижняя навигация с бейджами (F8) */
  .hero.tappable { cursor: pointer; }
  .tap-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; letter-spacing: .5px;
    color: #2a1a06; background: linear-gradient(180deg,#ffd58a,#ffb347); padding: 4px 12px; border-radius: 999px;
    box-shadow: 0 3px 12px rgba(255,179,71,.55); animation: tapPulse 1.4s ease-in-out infinite; pointer-events: none; white-space: nowrap; }

  .meta-panel { display: none; text-align: left; min-height: 90px; margin-top: 14px; }

  /* Шапка меню не ужимается flex'ом: без этого при нехватке высоты блоки
     схлопываются и контент панелей визуально наезжает на СТАРТ. */

  .meta-scroll { overflow-y: auto; flex: 1; min-height: 40px; -webkit-overflow-scrolling: touch; margin: 0 -6px; padding: 0 6px; border-top: 1px solid rgba(255,255,255,0.07); }

  .stats-row label { display: block; font-size: 10px; color: #6d80a0; font-weight: 400; margin-top: 2px; }
  .rosette svg { display: block; }
  .over-missions { text-align: left; margin: 4px 0 12px; display: flex; flex-direction: column; gap: 6px; }
  .over-mission-row { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 7px 11px; font-size: 12.5px; color: #c8d6ec; }
  .over-mission-row .mission-line { display: flex; justify-content: space-between; }
  .over-mission-row span { color: #ffd587; font-weight: 700; }
  .over-mission-row.done { background: rgba(127,224,86,0.12); border: 1px solid rgba(127,224,86,0.4); }
  .start-btn {
    background: linear-gradient(180deg, #ffb347, #f08a2c); border: none; border-radius: 16px;
    color: #3a2408; font-size: 20px; font-weight: 900; letter-spacing: 2px;
    padding: 12px 54px; cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 24px rgba(240,138,44,0.4), inset 0 2px 0 rgba(255,255,255,0.4);
    transition: transform 0.12s;
  }
  .start-btn:hover { transform: scale(1.05); }
  .start-btn:active { transform: scale(0.97); }
  .controls-hint { color: #6d80a0; font-size: 11.5px; margin-top: 8px; }
  /* Ссылка на дневник Хлои во ВКонтакте */
  .diary-link {
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
    color: #cfe0ff; font-size: 12.5px; font-weight: 600;
    background: rgba(90,143,255,0.14); border: 1px solid rgba(90,143,255,0.3);
    border-radius: 12px; padding: 7px 14px; margin-top: 10px;
    transition: transform 0.12s, background 0.2s;
  }
  .diary-link:hover { background: rgba(90,143,255,0.24); transform: translateY(-1px); }
  .diary-link:active { transform: scale(0.97); }
  .diary-link .vk { color: #7aa0ff; font-weight: 800; }
  .menu-card .diary-link { margin-top: 4px; }
  /* Плашка дневника центрируется внутри панелей меты (панель выровнена по левому краю) */
  .meta-panel .diary-link { display: flex; width: fit-content; margin: 8px auto 2px; }
  .over-card .diary-link { margin-top: 14px; }
  #version-badge {
    position: fixed; right: 8px; bottom: 6px; z-index: 60; pointer-events: auto;
    color: rgba(200,214,236,0.5); font-size: 10px; letter-spacing: 0.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    display: flex; align-items: center; gap: 6px;
  }
  #force-update {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(200,214,236,0.75); font-size: 10px; border-radius: 7px;
    padding: 2px 7px; cursor: pointer; font-family: inherit;
  }
  #force-update:active { transform: scale(0.94); }

  /* Game over */
  #gameover {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,12,24,0.45);
  }
  .over-card {
    width: min(420px, 94vw); max-height: 96vh; overflow: hidden;
    background: rgba(14,22,38,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px; padding: 24px 28px; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: cardIn 0.45s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  @keyframes cardIn { 0% { transform: translateY(60px) scale(0.9); opacity: 0; } }
  .over-head { font-size: 24px; font-weight: 900; color: #ffd587; letter-spacing: 2px; }
  .rosette-big { font-size: 56px; margin: 6px 0; animation: rosette 0.8s ease-out; }
  @keyframes rosette { 0% { transform: scale(0) rotate(-180deg); } 60% { transform: scale(1.3) rotate(10deg); } }
  .over-score { font-size: 46px; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  .over-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 16px 0; color: #9db4d4; font-size: 13px; }
  .over-grid b { color: #fff; font-size: 17px; display: block; }
  .over-mission { background: rgba(255,213,135,0.12); color: #ffd587; border-radius: 10px; padding: 7px; font-size: 13px; margin-bottom: 6px; }
  .over-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
  .menu-btn {
    background: rgba(255,255,255,0.1); border: none; border-radius: 16px;
    color: #c8d6ec; font-size: 16px; font-weight: 700; padding: 14px 28px;
    cursor: pointer; font-family: inherit;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.18); }

  /* Миссии-тосты */
  /* Плашки миссий — ВНИЗУ экрана (трасса там уже пройдена): по центру-верху они
     закрывали зону появления снарядов, и на скорости игрок врезался вслепую. */
  #mission-toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column-reverse; gap: 6px; pointer-events: none; }
  .mission-complete {
    background: rgba(20,34,20,0.72); border: 1px solid rgba(127,224,86,0.7); color: #d7f5c8;
    border-radius: 12px; padding: 6px 14px; font-size: 12.5px; text-align: center; white-space: nowrap;
    animation: toastIn 0.35s ease-out;
    box-shadow: 0 6px 22px rgba(0,0,0,0.35);
  }
  .mission-complete b { color: #ffd587; }
  @keyframes toastIn { 0% { transform: translateY(18px); opacity: 0; } }

  /* --- Адаптация: на невысоких экранах КОМПАКТИМ (не прячем функциональность!).
     Весь контент доступен через аккуратный скролл карточки. Лидерборд, регистрация
     ника, слово дня — видны на любом экране. --- */
  @media (max-height: 820px) {
    .hero img { height: 108px; }
    .recovered-row { font-size: 11px; padding: 5px 9px; }
    .menu-card h1 { font-size: 26px; }
    .over-card { padding: 12px 16px; }
    .menu-card { --menu-pad: 16px; padding: 12px var(--menu-pad) 0; }
    .hero { margin: -12px -16px 8px; }
    .mission-best { display: none; }
    .missions { gap: 4px; margin: 8px 0; }
    .mission { padding: 5px 9px; font-size: 11.5px; }
    .dog-emoji { height: 44px; }
    .dog-emoji img { width: 42px; height: 42px; }
    .rivals .rival:nth-child(n+4) { display: none; }
    .rosette-big { font-size: 40px; margin: 2px 0; }
    .rosette-big svg { width: 44px; height: 44px; }
    .over-score { font-size: 34px; }
    .over-grid { margin: 8px 0; gap: 5px; font-size: 12px; }
  }
  @media (max-height: 640px) {
    .hero { display: none; }
    .menu-card::before { content: 'AGILITY RUSH'; display: block; font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px; margin-bottom: 8px; }
    .title-next { font-size: 10.5px; }
    .controls-hint { display: none; }
    .stats-row label { display: none; }
    .over-missions { display: none; }
    .start-btn { padding: 10px 44px; font-size: 17px; }
    .rivals .rival:nth-child(n+3) { display: none; }
  }
  @media (max-width: 420px) {
    .menu-card h1 { font-size: 24px; }
    .dog-perk { font-size: 9.5px; }
    .dog-name { font-size: 11.5px; }
    #score { font-size: 27px; top: 10px; right: 12px; }
    #cookies { font-size: 16px; top: 44px; right: 12px; }
    #combo .combo-num { font-size: 24px; }
    .popup.perfect { font-size: 34px; }
    .popup.clean, .popup.fault { font-size: 24px; }
    .popup.scorepop { font-size: 24px; }
  }

  #update-banner {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: none; z-index: 50; pointer-events: auto;
    background: rgba(20,34,58,0.96); border: 1px solid rgba(255,179,71,0.5);
    border-radius: 14px; padding: 10px 14px; color: #ffd587; font-size: 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  #update-banner button {
    margin-left: 10px; background: linear-gradient(180deg, #ffb347, #f08a2c); border: none;
    border-radius: 9px; color: #3a2408; font-weight: 800; padding: 5px 14px; cursor: pointer; font-family: inherit;
  }

  body.harness #countdown { display: none !important; }
  /* В harness-режиме CSS-анимации не тикают (headless) — показываем попапы статично */
  body.harness .popup, body.harness .mission-complete, body.harness .over-card, body.harness .count-num, body.harness .rosette-big {
    animation: none !important; opacity: 1 !important;
  }
  body.harness .popup { transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="vignette"></div>
  <div id="speedlines"></div>
  <div id="flash"></div>
  <div id="version-badge"></div>
  <div id="ui">
    <div id="hud">
      <div id="score-row"><div id="mult">×1</div><div id="score">0</div></div>
      <div id="cookies">🦴 0</div>
      <div id="tokens" style="display:none">🏵 0</div>
      <button id="pause-btn" aria-label="Пауза">⏸</button>
      <div id="combo">
        <div class="combo-num">×2</div>
        <div id="combo-bar"><div id="combo-fill"></div></div>
      </div>
      <div id="chain"><span id="chain-txt"></span></div>
      <div id="powerups"></div>
      <div id="tug-box" style="display:none">
        <div id="tug-hint">👆</div>
        <button id="tug-btn" aria-label="Активировать пуллер"><b id="tug-n">0</b></button>
        <span id="tug-cap">Пуллер</span>
      </div>
    </div>
    <div id="menu"></div>
    <div id="gameover"></div>
    <div id="countdown"></div>
    <div id="revive"></div>
    <div id="pause"></div>
    <div id="leaderboard"></div>
    <div id="shop"></div>
    <div id="tut-hint"></div>
    <div id="update-banner">Доступно обновление игры <button id="update-apply">Обновить</button></div>
    <div id="mission-toast"></div>
  </div>
  <div id="popups"></div>
  <script type="importmap">
    { "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
